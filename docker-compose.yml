# Laravel 12 + MySQL + RabbitMQ + Vue 3 (Node) — jeden stack, bez osobnego mikroserwisu aplikacyjnego
# Uruchomienie: docker compose up -d
# Backend (API): http://localhost:8080  |  Vite (Vue): http://localhost:5173

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - stack

  app:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-laravel}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stack

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - stack

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-laravel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - stack

  # Vue 3 (Vite) — Node LTS; po utworzeniu projektu w ./frontend: docker compose exec frontend sh -lc "npm install && npm run dev -- --host 0.0.0.0"
  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
    tty: true
    stdin_open: true
    command: tail -f /dev/null
    networks:
      - stack

networks:
  stack:
    driver: bridge

volumes:
  mysql_data:
  rabbitmq_data:
